apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-db 
  namespace: praveen-ns
spec:
  affinity:
    nodeAffinity:
      podAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpression:
                - key: app
                  operator: In
                  values:
                    - backendNode 
        # podAntiAffinity:  
        #   preferredDuringSchedulingIgnoredDuringExecution:
        #     - weight: 100
        #       podAffinityTerm:
        #         labelSelector:
        #           matchExpression:
        #             - key: worker
        #               values:
        #                 - node1 
        #               operator: NotIn
  replicas: 2
  selector:
    matchLabels:
      app: mongo-db
  template:
    metadata:
      labels:
        app: mongo-db
    spec:
      containers:
        - name: mongo-db
          ports:
            - containerPort: 27017
          image: mongo:7.0
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-service
  namespace: praveen-ns
spec:
  selector:
    app: mongo-db
  ports:
  - port: 27017
    targetPort: 27017
  type: ClusterIP
